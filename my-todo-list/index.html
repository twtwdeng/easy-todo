<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务清单</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1 class="app__title">任务清单</h1>
      <p class="app__subtitle">专注当下，一件一件完成。</p>
    </header>

    <form class="todo-form" id="todo-form" autocomplete="off">
      <input
        type="text"
        class="todo-form__input"
        id="todo-input"
        placeholder="添加新任务…"
        aria-label="新任务内容"
        maxlength="200"
      >
      <button type="submit" class="todo-form__btn" id="add-btn">添加</button>
    </form>

    <ul class="todo-list" id="todo-list" aria-live="polite"></ul>

    <p class="app__empty" id="empty-hint">暂无任务，从上方开始添加吧。</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
